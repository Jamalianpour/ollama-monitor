name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── Python backend ──────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Syntax check
        run: python -m py_compile backend/main.py backend/database.py

      - name: Import check
        run: |
          cd backend
          python -c "import main; import database; print('Imports OK')"

  # ── Flutter frontend ────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Flutter Web)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.x"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: ollama_monitor_app
        run: flutter pub get

      - name: Build web
        working-directory: ollama_monitor_app
        run: flutter build web --release

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: ollama_monitor_app/build/web/
          retention-days: 7
